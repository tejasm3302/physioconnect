<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhysioConnect - Find Your Perfect Physiotherapist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      // Apply theme before page renders to prevent flash
      (function() {
        try {
          var theme = localStorage.getItem('physio_theme');
          if (theme) theme = JSON.parse(theme);
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else if (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
    <style>
      /* Prevent flash of wrong theme */
      html.dark body { background-color: #09090b; color: #f4f4f5; }
      body { background-color: #fff7ed; color: #1e293b; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
