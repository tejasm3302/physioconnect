name: Deploy Docker Stack

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Deploy from local repo folder
        shell: powershell
        run: |
          $repo = 'C:\Users\Admin\Downloads\physioconnect-marketplace-application (7)'
          $git = 'C:\Program Files\Git\cmd\git.exe'
          $docker = 'C:\Program Files\Docker\Docker\resources\bin\docker.exe'

          if (!(Test-Path $repo)) { throw "Repo folder not found: $repo" }
          if (!(Test-Path $git)) { throw "Git not found: $git" }
          if (!(Test-Path $docker)) { throw "Docker not found: $docker" }

          & $git -C $repo fetch origin main
          & $git -C $repo reset --hard origin/main

          Set-Location $repo
          & $docker compose up -d --build
          & $docker compose ps