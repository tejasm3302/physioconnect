name: Deploy Docker Stack

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker compose up
        shell: powershell
        run: |
          $docker = 'C:\Program Files\Docker\Docker\resources\bin\docker.exe'
          if (!(Test-Path $docker)) { throw "Docker executable not found at $docker" }
          & $docker compose up -d --build

      - name: Show running containers
        shell: powershell
        run: |
          $docker = 'C:\Program Files\Docker\Docker\resources\bin\docker.exe'
          & $docker compose ps