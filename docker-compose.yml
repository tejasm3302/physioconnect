services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: physioconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/physioconnect
      API_ORIGIN: http://localhost
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      ALLOW_MIGRATION_IMPORT: 'false'
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      args:
        VITE_USE_BACKEND: "true"
        VITE_API_BASE_URL: "/api"
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
